services:
  - type: web
    name: smartstock-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: smartstock_db
      - key: SECRET_KEY
        generateValue: true
